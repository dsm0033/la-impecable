<svg viewBox="0 0 680 520" width="100%" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">QR Code para laimpecable.es</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Código QR que enlaza a laimpecable.es con diseño de marca Impecable en negro y dorado</desc>

  <rect x="140" y="20" width="400" height="480" rx="16" fill="#0A0E14" style="fill:rgb(10, 14, 20);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- QR code via Google Charts API rendered as image -->
  <image href="https://api.qrserver.com/v1/create-qr-code/?size=280x280&amp;data=https://laimpecable.es&amp;bgcolor=0A0E14&amp;color=C9A84C&amp;qzone=1" x="200" y="60" width="280" height="280" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Nombre marca -->
  <text x="340" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#C9A84C" letter-spacing="6" style="fill:rgb(201, 168, 76);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">IMPECABLE</text>

  <!-- Línea dorada -->
  <line x1="240" y1="398" x2="440" y2="398" stroke="#C9A84C" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(201, 168, 76);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline -->
  <text x="340" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#8A9AAC" letter-spacing="2" style="fill:rgb(138, 154, 172);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Cuidado Profesional del Vehículo</text>

  <!-- URL -->
  <text x="340" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9A84C" style="fill:rgb(201, 168, 76);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">laimpecable.es</text>

  <!-- Sanlúcar -->
  <text x="340" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5A6A7C" letter-spacing="1" style="fill:rgb(90, 106, 124);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Sanlúcar de Barrameda · Cádiz</text>
</svg>